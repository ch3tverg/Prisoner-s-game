<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дилемма заключенного</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .btn { padding: 15px 25px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .silent { background: #4CAF50; }
        .betray { background: #f44336; }
        #status { font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <h2>Дилемма заключенного</h2>
    <div id="status">Подключение...</div>
    <div id="game-actions" style="display:none;">
        <button class="btn silent" onclick="send('silent')">Молчать (Сотрудничать)</button>
        <button class="btn betray" onclick="send('betray')">Предать (Свидетельствовать)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const status = document.getElementById('status');
        const actions = document.getElementById('game-actions');

        socket.on('message', msg => status.innerText = msg);
        socket.on('start', msg => { status.innerText = msg; actions.style.display = 'block'; });
        socket.on('result', data => {
            status.innerHTML = `<h3>${data.text}</h3>`;
            actions.style.display = 'none';
        });

        function send(choice) {
            socket.emit('makeChoice', choice);
            status.innerText = "Вы сделали выбор. Ожидание напарника...";
            actions.style.display = 'none';
        }
    </script>
</body>
</html>
